<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漢字クイズゲーム</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }
    .kanji {
      font-size: 80px;
      font-weight: bold;
      margin: 20px 0;
    }
    .answer, .next-button {
      display: none;
      margin: 20px 0;
      font-size: 60px;
    }
    button {
      font-size: 60px;
      padding: 10px 20px;
      margin: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgb(255, 255, 255);
      display: flex;
      justify-content: center;
      align-items: center;
      color: rgb(12, 1, 1);
      font-size: 80px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="overlay" class="overlay">セリフ当てゲーム<br><br>エンターキーを押して開始</div>
  <div class="container" id="gameContainer" style="display: none;">
    <div id="quiz">
      <div id="kanji" class="kanji">山</div>
      <div id="answer" class="answer"></div>
      <button id="showAnswer">答えを見る</button>
      <button id="next" class="next-button">次の問題に進む</button>
    </div>
    <div id="result" class="answer"></div>
  </div>

  <script>
    const quizData = [
      { kanji: 'やられたらやり返す<br>倍返しだ!!', answer: '半沢直樹' },
      { kanji: '憧れるのをやめましょう', answer: '大谷翔平' },
      { kanji: 'デブとブスこそ<br>韓国に行け！！', answer: 'ルッキズムの阿部寛' },
      { kanji: '駅からO棟までが<br>遠すぎる！！', answer: '情テクの米倉涼子' },
      { kanji: 'Javava', answer: 'SEのあまちゃん' },
      { kanji: '明日は風が強いので<br>パンツのぞき放題ですね', answer: 'キショい予報士' },
      // { kanji: 'チョー気持ちいい', answer: '北島康介' },
      // { kanji: 'チョー気持ちいい', answer: 'ＳＥＸ後のつまんない青学生' },
      { kanji: 'せーの.zip', answer: '圧縮されたZIP' },
      { kanji: '祈りって200種類あんねん', answer: 'サンビカ' },
    //   { kanji: '今度ごはんいこうね～', answer: '絶対に行かないバカ女たち' },
      { kanji: 'お父さんの服と<br>一緒に洗濯しないで', answer: '反抗期のAdo' },
      { kanji: '早く撃ってちょうだい', answer: 'ゾンビ映画のタケモトピアノ' },
      { kanji: 'ミナさーん', answer: 'TWICEのライブに行った　　　マーティン先生' }
    ];

    let currentQuestion = 0;
    let score = 0;

    const kanjiElement = document.getElementById('kanji');
    const answerElement = document.getElementById('answer');
    const showAnswerButton = document.getElementById('showAnswer');
    const nextButton = document.getElementById('next');
    const resultElement = document.getElementById('result');
    const overlay = document.getElementById('overlay');
    const gameContainer = document.getElementById('gameContainer');

    function loadQuestion() {
        if (currentQuestion < quizData.length) {
        const { kanji } = quizData[currentQuestion];
        kanjiElement.innerHTML = kanji;
        answerElement.style.display = 'none';
        answerElement.textContent = '';
        showAnswerButton.style.display = 'inline-block';
        nextButton.style.display = 'none';
        } else {
            showResult();
        }
    }

    function showAnswer() {
      const { answer } = quizData[currentQuestion];
      answerElement.textContent = `答え: ${answer}`;
      answerElement.style.display = 'block';
      nextButton.style.display = 'inline-block';
      showAnswerButton.style.display = 'none';
      score++;
    }

    function nextQuestion() {
      currentQuestion++;
      loadQuestion();
    }

    function showResult() {
      kanjiElement.style.display = 'none';
      answerElement.style.display = 'none';
      showAnswerButton.style.display = 'none';
      nextButton.style.display = 'none';
      resultElement.style.display = 'block';
      resultElement.textContent = `終了！！`;
    }

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        overlay.style.display = 'none';
        gameContainer.style.display = 'block';
        loadQuestion();
      }
    });

    showAnswerButton.addEventListener('click', showAnswer);
    nextButton.addEventListener('click', nextQuestion);
  </script>
</body>
</html>
