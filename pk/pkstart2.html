<!DOCTYPE html>
<html>
<head>
  <title>画像表示の例</title>

  <style>
    /* 画像を中央に寄せるスタイル */
    img {
      display: block; /* インライン要素からブロック要素に変更 */
      margin: 0 auto; /* 左右のマージンを自動で調整して中央に配置 */
      width: 1000px;
      height: 600px;
    }

    /* ボタンを中央に寄せるスタイル */
    .center-button {
      text-align: center;
    }

    h1{
      font-size: 60px;
      text-align: center;
    }

    .large-button{
      width: 100%;
      height: 100px;
      font-size: 60px;
    }
  </style>
  
</head>
<body>
  <h1 style="text-align:center">ボールけるだけのゲーム</h1>
  <img src="endou2.png" alt="画像の説明">

  <input type="button" value="Game Start!！" onclick="location.href='pk2.html'" style="text-align: center; width: 100%;" class="large-button">

</body>
</html>
